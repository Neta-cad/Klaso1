<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">Your account</span>
    <h1>My profile</h1>
  </div>
</section>

<!-- ================= FORM ================= -->
<section style="padding: var(--gap-lg) 0;">
  <div class="container" style="max-width:520px;">

    <div style="text-align:center; margin-bottom:28px;">
      <img id="avatarPreview" src="" alt="" style="width:96px; height:96px; border-radius:50%; object-fit:cover; background:var(--paper-dim); border:2px solid var(--line); display:none;">
      <div id="avatarPlaceholder" style="width:96px; height:96px; border-radius:50%; background:var(--paper-dim); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto;">👤</div>
      <input type="file" id="avatarInput" accept="image/*" style="margin-top:14px;">
    </div>

    <form id="profileForm" style="display:flex; flex-direction:column; gap:16px;">

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Full name / School name</label>
        <input type="text" id="name" required
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Location</label>
        <select id="location" style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
          <option value="">Select location</option>
          <option value="Lagos">Lagos</option>
          <option value="Abuja">Abuja</option>
          <option value="Port Harcourt">Port Harcourt</option>
          <option value="Ibadan">Ibadan</option>
        </select>
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Phone number</label>
        <input type="tel" id="phone" placeholder="e.g. 0812 345 6789"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <label style="display:flex; align-items:center; gap:8px; font-size:0.88rem; color:var(--slate);">
        <input type="checkbox" id="phonePublic" style="accent-color:var(--marigold-deep);">
        Show my phone number publicly on my profile
      </label>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">About / Bio</label>
        <textarea id="bio" rows="4" placeholder="Tell others about yourself, your experience, or your school..."
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem; resize:vertical;"></textarea>
      </div>

      <button type="submit" class="btn btn-accent btn-block" id="saveBtn" style="margin-top:8px;">Save changes</button>
      <p id="successMsg" style="display:none; color:var(--chalk-green); font-weight:600; text-align:center;">✓ Profile updated!</p>
      <p id="errorMsg" style="display:none; color:var(--coral); font-weight:600; text-align:center;"></p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script>
  let currentUserId = null;
  let uploadedAvatarUrl = null;

  (async function loadProfile() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    currentUserId = session.user.id;

    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', currentUserId)
      .single();

    if (profile) {
      document.getElementById('name').value = profile.name || '';
      document.getElementById('location').value = profile.location || '';
      document.getElementById('phone').value = profile.phone || '';
      document.getElementById('phonePublic').checked = profile.phone_public || false;
      document.getElementById('bio').value = profile.bio_full || '';

      if (profile.avatar_url) {
        uploadedAvatarUrl = profile.avatar_url;
        document.getElementById('avatarPreview').src = profile.avatar_url;
        document.getElementById('avatarPreview').style.display = 'block';
        document.getElementById('avatarPlaceholder').style.display = 'none';
      }
    }
  })();

  document.getElementById('avatarInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const fileExt = file.name.split('.').pop();
    const filePath = `${currentUserId}-${Date.now()}.${fileExt}`;

    const { error: uploadError } = await supabaseClient.storage
      .from('avatars')
      .upload(filePath, file, { upsert: true });

    if (uploadError) {
      alert('Error uploading photo: ' + uploadError.message);
      return;
    }

    const { data: urlData } = supabaseClient.storage
      .from('avatars')
      .getPublicUrl(filePath);

    uploadedAvatarUrl = urlData.publicUrl;
    document.getElementById('avatarPreview').src = uploadedAvatarUrl;
    document.getElementById('avatarPreview').style.display = 'block';
    document.getElementById('avatarPlaceholder').style.display = 'none';
  });

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const saveBtn = document.getElementById('saveBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    saveBtn.textContent = 'Saving...';
    saveBtn.disabled = true;

    const { error } = await supabaseClient
      .from('profiles')
      .update({
        name: document.getElementById('name').value,
        location: document.getElementById('location').value,
        phone: document.getElementById('phone').value,
        phone_public: document.getElementById('phonePublic').checked,
        bio_full: document.getElementById('bio').value,
        avatar_url: uploadedAvatarUrl
      })
      .eq('id', currentUserId);

    saveBtn.textContent = 'Save changes';
    saveBtn.disabled = false;

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.style.display = 'block';
      return;
    }

    successMsg.style.display = 'block';
    setTimeout(() => { successMsg.style.display = 'none'; }, 2500);
  });
</script>
</body>
</html>
