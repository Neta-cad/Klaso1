<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="register.html" class="btn btn-primary btn-sm">Get started</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<section style="padding: var(--gap-lg) 0;">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center; margin-bottom:32px;">
      <span class="eyebrow">Account recovery</span>
      <h1 style="font-size:clamp(1.8rem,4vw,2.4rem); margin-top:6px;">Reset your password</h1>
      <p class="lede" style="margin:10px auto 0;">Enter your email and we'll send you a reset link.</p>
    </div>

    <form id="resetForm" style="display:flex; flex-direction:column; gap:16px;">
      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <button type="submit" class="btn btn-accent btn-block" id="submitBtn">Send reset link</button>
      <p id="errorMsg" style="display:none; color:var(--coral); font-size:0.88rem; font-weight:600;"></p>
      <p id="successMsg" style="display:none; color:var(--chalk-green); font-weight:600; text-align:center;">✓ Check your email for a reset link.</p>

      <p style="text-align:center; font-size:0.88rem; color:var(--slate);">
        <a href="login.html" style="color:var(--marigold-deep); font-weight:600;">Back to login</a>
      </p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
  document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    errorMsg.style.display = 'none';

    const email = document.getElementById('email').value;

    submitBtn.textContent = 'Sending...';
    submitBtn.disabled = true;

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/update-password.html'
    });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.style.display = 'block';
      submitBtn.textContent = 'Send reset link';
      submitBtn.disabled = false;
      return;
    }

    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
