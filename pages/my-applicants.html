<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Applicants — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">School dashboard</span>
    <h1>My job posts & applicants</h1>
  </div>
</section>

<!-- ================= ACCESS DENIED ================= -->
<div id="accessDenied" style="display:none; text-align:center; padding:80px 20px;">
  <h2>🚫 This page is for school owners only</h2>
  <p style="color:var(--slate); margin-top:10px;">Log in with a school owner account to view your applicants.</p>
</div>

<!-- ================= LIST ================= -->
<section class="container" id="jobsSection" style="display:none; padding:32px 20px;">
  <div id="jobsList" style="display:flex; flex-direction:column; gap:20px;"></div>
</section>

<style>
  .job-block {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
  }
  .job-block-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .applicant-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-top: 1px dotted var(--line);
    flex-wrap: wrap;
    gap: 10px;
  }
  .status-badge {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .status-pending { background: rgba(232,163,61,0.15); color: var(--marigold-deep); }
  .status-shortlisted { background: rgba(47,111,78,0.15); color: var(--chalk-green); }
  .status-rejected { background: rgba(225,91,79,0.15); color: var(--coral); }
  .status-hired { background: var(--ink); color: var(--paper); }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  let currentUserId = null;

  (async function checkAccess() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', session.user.id)
      .single();

    if (!profile || profile.role !== 'school') {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }

    currentUserId = session.user.id;
    document.getElementById('jobsSection').style.display = 'block';
    loadMyJobs();
  })();

  async function loadMyJobs() {
    const list = document.getElementById('jobsList');
    list.innerHTML = '<p style="color:var(--slate);">Loading...</p>';

    const { data: jobs, error } = await supabaseClient
      .from('jobs')
      .select('*')
      .eq('school_id', currentUserId)
      .order('created_at', { ascending: false });

    if (error || !jobs || jobs.length === 0) {
      list.innerHTML = '<p style="color:var(--slate);">You haven\'t posted any jobs yet. <a href="post-job.html" style="color:var(--marigold-deep); font-weight:600;">Post your first job →</a></p>';
      return;
    }

    let html = '';

    for (const job of jobs) {
      const { data: applications } = await supabaseClient
        .from('applications')
        .select('*, profiles(name, role)')
        .eq('job_id', job.id)
        .order('created_at', { ascending: false });

      const apps = applications || [];

      html += `
        <div class="job-block">
          <div class="job-block-head">
            <div>
              <h3>${job.title}</h3>
              <span style="font-size:0.85rem; color:var(--slate);">${job.location} · ${apps.length} applicant${apps.length !== 1 ? 's' : ''}</span>
            </div>
          </div>
          ${apps.length === 0
            ? '<p style="color:var(--slate); font-size:0.88rem;">No applicants yet.</p>'
            : apps.map(a => `
              <div class="applicant-row">
                <div>
                  <strong><a href="view-profile.html?id=${a.applicant_id}" style="color:inherit;">${a.profiles ? a.profiles.name : 'Applicant'}</a></strong>
                  ${a.message ? `<p style="font-size:0.85rem; color:var(--slate); margin-top:4px;">"${a.message}"</p>` : ''}
                  <button class="btn btn-sm btn-ghost" style="margin-top:6px;" onclick="messageApplicant('${a.applicant_id}')">💬 Message</button>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                  <span class="status-badge status-${a.status}">${a.status}</span>
                  ${a.status === 'pending' ? `
                    <button class="btn btn-sm btn-accent" onclick="updateStatus('${a.id}', 'shortlisted', '${a.applicant_id}')">Shortlist</button>
                    <button class="btn btn-sm btn-ghost" onclick="updateStatus('${a.id}', 'rejected', '${a.applicant_id}')">Reject</button>
                  ` : ''}
                  ${a.status === 'shortlisted' ? `
                    <button class="btn btn-sm btn-primary" onclick="updateStatus('${a.id}', 'hired', '${a.applicant_id}')">Mark hired</button>
                  ` : ''}
                  ${a.status === 'hired' ? `
                    <button class="btn btn-sm btn-ghost" onclick="leaveReview('${a.applicant_id}', 'job_${job.id}')">⭐ Review</button>
                  ` : ''}
                </div>
              </div>
            `).join('')
          }
        </div>
      `;
    }

    list.innerHTML = html;
  }

  async function updateStatus(applicationId, newStatus, applicantId) {
    await supabaseClient
      .from('applications')
      .update({ status: newStatus })
      .eq('id', applicationId);

    const statusMessages = {
      shortlisted: 'Your application was shortlisted! 🎉',
      rejected: 'Your application was not selected this time.',
      hired: 'Congratulations! You were hired! 🎉'
    };
    if (statusMessages[newStatus]) {
      await createNotification(applicantId, 'application_update', statusMessages[newStatus], 'jobs.html');
    }

    loadMyJobs();
  }
  async function messageApplicant(applicantId) {
  const result = await getOrCreateConversation(applicantId);
  if (!result.success) {
    alert('Error: ' + result.message);
    return;
  }
  window.location.href = 'chat.html?id=' + result.conversation.id;
}
async function leaveReview(revieweeId, context) {
    const ratingStr = prompt('Rate this person from 1 to 5 stars:');
    const rating = parseInt(ratingStr);

    if (!rating || rating < 1 || rating > 5) {
      alert('Please enter a number between 1 and 5.');
      return;
    }

    const comment = prompt('Add a comment (optional):');

    const result = await submitReview(revieweeId, rating, comment, context);

    if (!result.success) {
      alert('Error submitting review: ' + result.message);
      return;
    }

    alert('✓ Review submitted!');
  }
</script>
</body>
</html>
