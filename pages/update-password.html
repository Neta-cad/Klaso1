<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
    </nav>
    <div class="nav-actions" id="navActions"></div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<section style="padding: var(--gap-lg) 0;">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center; margin-bottom:32px;">
      <span class="eyebrow">Account recovery</span>
      <h1 style="font-size:clamp(1.8rem,4vw,2.4rem); margin-top:6px;">Set a new password</h1>
    </div>

    <form id="updateForm" style="display:flex; flex-direction:column; gap:16px;">
      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">New password</label>
        <input type="password" id="newPassword" required minlength="6" placeholder="At least 6 characters"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <button type="submit" class="btn btn-accent btn-block" id="submitBtn">Update password</button>
      <p id="errorMsg" style="display:none; color:var(--coral); font-size:0.88rem; font-weight:600;"></p>
      <p id="successMsg" style="display:none; color:var(--chalk-green); font-weight:600; text-align:center;">✓ Password updated! Redirecting to login...</p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
  document.getElementById('updateForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    errorMsg.style.display = 'none';

    const newPassword = document.getElementById('newPassword').value;

    submitBtn.textContent = 'Updating...';
    submitBtn.disabled = true;

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.style.display = 'block';
      submitBtn.textContent = 'Update password';
      submitBtn.disabled = false;
      return;
    }

    document.getElementById('updateForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';

    setTimeout(async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'login.html';
    }, 1800);
  });
</script>
</body>
</html>
