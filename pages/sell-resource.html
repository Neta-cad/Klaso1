<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell a Resource — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="resources.html">Resources</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">Earn from your materials</span>
    <h1>Sell a resource.</h1>
    <p class="lede" style="margin-top:10px;">Upload notes, past questions, or worksheets for others to buy.</p>
  </div>
</section>

<!-- ================= FORM ================= -->
<section style="padding: var(--gap-lg) 0;">
  <div class="container" style="max-width:640px;">
    <form id="resourceForm" style="display:flex; flex-direction:column; gap:16px;">

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Title</label>
        <input type="text" id="title" required placeholder="e.g. WAEC Mathematics Past Questions 2020-2024"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Subject</label>
        <input type="text" id="subject" placeholder="e.g. Mathematics"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Description</label>
        <textarea id="description" required rows="3" placeholder="What's included, what level it's for..."
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem; resize:vertical;"></textarea>
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Price (₦, enter 0 for free)</label>
        <input type="number" id="price" required min="0" placeholder="0"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">File (PDF, image, or document)</label>
        <input type="file" id="fileInput" required accept=".pdf,.doc,.docx,.jpg,.png"
          style="width:100%;">
      </div>

      <button type="submit" class="btn btn-accent btn-block" id="submitBtn" style="margin-top:8px;">Upload resource</button>
      <p id="errorMsg" style="display:none; color:var(--coral); font-size:0.88rem; font-weight:600;"></p>
      <p id="successMsg" style="display:none; color:var(--chalk-green); font-weight:600; text-align:center;">✓ Resource uploaded! Redirecting...</p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  let currentUserId = null;

  (async function checkAccess() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert('Please log in to sell a resource.');
      window.location.href = 'login.html';
      return;
    }
    currentUserId = session.user.id;
  })();

  document.getElementById('resourceForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    errorMsg.style.display = 'none';

    const file = document.getElementById('fileInput').files[0];
    if (!file) {
      errorMsg.textContent = 'Please choose a file to upload.';
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.textContent = 'Uploading...';
    submitBtn.disabled = true;

    const fileExt = file.name.split('.').pop();
    const filePath = `${currentUserId}-${Date.now()}.${fileExt}`;

    const { error: uploadError } = await supabaseClient.storage
      .from('resources')
      .upload(filePath, file);

    if (uploadError) {
      errorMsg.textContent = 'Upload failed: ' + uploadError.message;
      errorMsg.style.display = 'block';
      submitBtn.textContent = 'Upload resource';
      submitBtn.disabled = false;
      return;
    }

    const { data: urlData } = supabaseClient.storage
      .from('resources')
      .getPublicUrl(filePath);

    const { error: insertError } = await supabaseClient
      .from('resources')
      .insert({
        seller_id: currentUserId,
        title: document.getElementById('title').value,
        subject: document.getElementById('subject').value,
        description: document.getElementById('description').value,
        price: parseInt(document.getElementById('price').value) || 0,
        file_url: urlData.publicUrl
      });

    if (insertError) {
      errorMsg.textContent = insertError.message;
      errorMsg.style.display = 'block';
      submitBtn.textContent = 'Upload resource';
      submitBtn.disabled = false;
      return;
    }

    document.getElementById('resourceForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';

    setTimeout(() => {
      window.location.href = 'resources.html';
    }, 1500);
  });
</script>
</body>
</html>
