<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="resources.html">Resources</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">Study materials</span>
    <h1>Notes, past questions & worksheets.</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by title or subject...">
      <a href="sell-resource.html" class="btn btn-accent">Sell a resource</a>
    </div>
  </div>
</section>

<!-- ================= LISTINGS ================= -->
<section class="listing-layout">
  <div class="container">
    <p class="results-meta" id="resultsMeta">Loading resources...</p>
    <div class="listing-grid" id="resourcesGrid"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  let allResources = [];

  async function loadResources() {
    const grid = document.getElementById('resourcesGrid');
    const meta = document.getElementById('resultsMeta');

    const { data, error } = await supabaseClient
      .from('resources')
      .select('*, profiles(name)')
      .order('created_at', { ascending: false });

    if (error || !data) {
      grid.innerHTML = '<div class="empty-state"><h3>Error loading resources</h3></div>';
      return;
    }

    allResources = data;
    renderResources();
  }

  function renderResources() {
    const grid = document.getElementById('resourcesGrid');
    const meta = document.getElementById('resultsMeta');
    const search = document.getElementById('searchInput').value.toLowerCase();

    let resources = allResources.filter(r =>
      r.title.toLowerCase().includes(search) ||
      (r.subject || '').toLowerCase().includes(search)
    );

    meta.textContent = resources.length + ' resource' + (resources.length !== 1 ? 's' : '') + ' found';

    if (resources.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h3>No resources found</h3><p>Try a different search, or be the first to sell one.</p></div>';
      return;
    }

    grid.innerHTML = resources.map(r => `
      <div class="job-card">
        <div class="job-card-top">
          <div>
            <div class="job-school">${r.profiles ? r.profiles.name : 'Seller'} ${r.subject ? '· ' + r.subject : ''}</div>
            <h3>${r.title}</h3>
          </div>
        </div>
        <p style="color:var(--slate); font-size:0.88rem; margin-bottom:16px;">${r.description}</p>
        <div class="job-foot">
          <span class="job-pay">${r.price > 0 ? '₦' + r.price.toLocaleString() : 'Free'}</span>
          <button class="btn btn-sm btn-ghost" onclick="downloadResource('${r.id}', '${r.file_url}')">Download</button>
        </div>
      </div>
    `).join('');
  }

  async function downloadResource(id, fileUrl) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert('Please log in to download resources.');
      window.location.href = 'login.html';
      return;
    }

    // Increment download count (simple tracking, not payment-gated yet)
    const resource = allResources.find(r => r.id === id);
    if (resource && resource.price > 0) {
      alert('This is a paid resource (₦' + resource.price.toLocaleString() + '). Payment for resources is coming soon — for now, downloads are free while we test.');
    }

    await supabaseClient
      .from('resources')
      .update({ downloads: (resource ? resource.downloads : 0) + 1 })
      .eq('id', id);

    window.open(fileUrl, '_blank');
  }

  document.getElementById('searchInput').addEventListener('input', renderResources);

  loadResources();
</script>
</body>
</html>
