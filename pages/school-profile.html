<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Profile — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<section style="padding: var(--gap-xl) 0;">
  <div class="container" style="max-width:680px;">
    <div id="loadingMsg" style="text-align:center; color:var(--slate); padding:60px 0;">Loading school...</div>
    <div id="notFoundMsg" style="display:none; text-align:center; padding:60px 0;">
      <h2>School not found</h2>
    </div>

    <div id="schoolContent" style="display:none;">
      <div style="text-align:center; margin-bottom:28px;">
        <img id="schoolAvatar" src="" alt="" style="width:100px; height:100px; border-radius:16px; object-fit:cover; background:var(--paper-dim); border:2px solid var(--line); display:none; margin:0 auto;">
        <div id="schoolAvatarPlaceholder" style="width:100px; height:100px; border-radius:16px; background:var(--paper-dim); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:2.4rem; margin:0 auto;">🏫</div>

        <h1 id="schoolName" style="margin-top:16px; font-size:1.7rem;"></h1>
        <div id="schoolBadges" style="display:flex; justify-content:center; gap:8px; margin-top:8px;"></div>
        <p id="schoolLocation" style="color:var(--slate); font-size:0.9rem; margin-top:6px;"></p>
        <div id="ratingDisplay" style="margin-top:10px; font-size:0.9rem;"></div>
        <button id="messageSchoolBtn" class="btn btn-accent btn-sm" style="margin-top:16px;">💬 Message this school</button>
      </div>

      <div style="background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:24px;">
        <h3 style="font-size:1rem; margin-bottom:10px;">About</h3>
        <p id="schoolBio" style="color:var(--slate); font-size:0.92rem; line-height:1.6;"></p>
      </div>
      <div style="background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:24px;">
        <h3 style="font-size:1rem; margin-bottom:14px;">Reviews</h3>
        <div id="reviewsList">Loading...</div>
      </div>

      <h3 style="font-size:1.1rem; margin-bottom:14px;">Open positions</h3>
      <div id="schoolJobsList" style="display:flex; flex-direction:column; gap:12px;"></div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/messaging.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  let schoolId = null;

  (async function loadSchool() {
    const params = new URLSearchParams(window.location.search);
    schoolId = params.get('id');

    if (!schoolId) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('notFoundMsg').style.display = 'block';
      return;
    }

    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', schoolId)
      .eq('role', 'school')
      .single();

    document.getElementById('loadingMsg').style.display = 'none';

    if (error || !profile) {
      document.getElementById('notFoundMsg').style.display = 'block';
      return;
    }

    document.getElementById('schoolContent').style.display = 'block';
    document.getElementById('schoolName').textContent = profile.name;
    document.getElementById('schoolLocation').textContent = profile.location || '';
    document.getElementById('schoolBio').textContent = profile.bio_full || 'No description added yet.';

    let badges = '';
    if (profile.verified) badges += '<span class="stamp stamp-verified">Verified</span>';
    if (profile.plan === 'pro') badges += '<span class="stamp stamp-pro">Pro</span>';
    document.getElementById('schoolBadges').innerHTML = badges;

    if (profile.avatar_url) {
      document.getElementById('schoolAvatar').src = profile.avatar_url;
      document.getElementById('schoolAvatar').style.display = 'block';
      document.getElementById('schoolAvatarPlaceholder').style.display = 'none';
    }

    loadSchoolJobs();
    loadReviews();
  })();

  async function loadSchoolJobs() {
    const list = document.getElementById('schoolJobsList');

    const { data: jobs, error } = await supabaseClient
      .from('jobs')
      .select('*')
      .eq('school_id', schoolId)
      .eq('status', 'open')
      .order('created_at', { ascending: false });

    if (error || !jobs || jobs.length === 0) {
      list.innerHTML = '<p style="color:var(--slate);">No open positions right now.</p>';
      return;
    }

    list.innerHTML = jobs.map(j => `
      <a href="jobs.html" style="text-decoration:none; color:inherit;">
        <div class="job-card">
          <div class="job-card-top">
            <div>
              <h3>${j.title}</h3>
            </div>
          </div>
          <div class="job-meta">
            <span class="tag">${j.type}</span>
            <span class="tag">${j.level}</span>
            <span class="tag">${j.mode}</span>
          </div>
          <div class="job-foot">
            <span class="job-pay">${j.pay}</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  document.getElementById('messageSchoolBtn').addEventListener('click', async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      alert('Please log in to message this school.');
      window.location.href = 'login.html';
      return;
    }
    if (session.user.id === schoolId) {
      alert('This is your own school profile.');
      return;
    }
    const result = await getOrCreateConversation(schoolId);
    if (!result.success) {
      alert('Error: ' + result.message);
      return;
    }
    window.location.href = 'chat.html?id=' + result.conversation.id;
  });
  async function loadReviews() {
    const { average, count } = await getAverageRating(schoolId);
    const ratingDisplay = document.getElementById('ratingDisplay');

    if (count === 0) {
      ratingDisplay.innerHTML = '<span style="color:var(--slate);">No reviews yet</span>';
    } else {
      ratingDisplay.innerHTML = `<span style="color:var(--marigold-deep);">${renderStars(average)}</span> <span style="color:var(--slate);">${average} (${count} review${count !== 1 ? 's' : ''})</span>`;
    }

    const reviews = await getReviewsFor(schoolId);
    const list = document.getElementById('reviewsList');

    if (reviews.length === 0) {
      list.innerHTML = '<p style="color:var(--slate); font-size:0.88rem;">No reviews yet.</p>';
      return;
    }

    list.innerHTML = reviews.map(r => `
      <div style="padding:12px 0; border-top:1px solid var(--line);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong style="font-size:0.88rem;">${r.profiles ? r.profiles.name : 'Anonymous'}</strong>
          <span style="color:var(--marigold-deep); font-size:0.85rem;">${renderStars(r.rating)}</span>
        </div>
        ${r.comment ? `<p style="font-size:0.85rem; color:var(--slate); margin-top:6px;">"${r.comment}"</p>` : ''}
      </div>
    `).join('');
  }
</script>
</body>
</html>
