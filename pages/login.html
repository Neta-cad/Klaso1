<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="schools.html">Schools</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="register.html" class="btn btn-primary btn-sm">Get started</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= FORM ================= -->
<section style="padding: var(--gap-lg) 0;">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center; margin-bottom:32px;">
      <span class="eyebrow">Welcome back</span>
      <h1 style="font-size:clamp(1.8rem,4vw,2.4rem); margin-top:6px;">Log in</h1>
    </div>

    <form id="loginForm" style="display:flex; flex-direction:column; gap:16px;">

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <div>
        <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:6px;">Password</label>
        <input type="password" id="password" required placeholder="Your password"
          style="width:100%; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; font-family:var(--font-body); font-size:0.95rem;">
      </div>

      <p id="errorMsg" style="display:none; color:var(--coral); font-size:0.88rem; font-weight:600;"></p>

      <button type="submit" class="btn btn-accent btn-block" id="submitBtn" style="margin-top:8px;">Log in</button>

     <p style="text-align:center; font-size:0.88rem; color:var(--slate);">
        Don't have an account? <a href="register.html" style="color:var(--marigold-deep); font-weight:600;">Sign up</a>
      </p>
      <p style="text-align:center; font-size:0.85rem;">
        <a href="forgot-password.html" style="color:var(--slate);">Forgot your password?</a>
      </p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    errorMsg.style.display = 'none';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    submitBtn.textContent = 'Logging in...';
    submitBtn.disabled = true;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.style.display = 'block';
      submitBtn.textContent = 'Log in';
      submitBtn.disabled = false;
      return;
    }

    window.location.href = '../index.html';
  });
</script>
</body>
</html>
