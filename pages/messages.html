<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">Inbox</span>
    <h1>Messages</h1>
  </div>
</section>

<!-- ================= LIST ================= -->
<section class="container" style="padding:32px 20px; max-width:640px;">
  <div id="conversationsList" style="display:flex; flex-direction:column; gap:2px;"></div>
</section>

<style>
  .conv-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }
  .conv-row:hover { box-shadow: var(--shadow); }
  .conv-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--paper-dim);
    flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name { font-weight: 600; font-size: 0.95rem; }
  .conv-preview {
    font-size: 0.85rem;
    color: var(--slate);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-time { font-size: 0.75rem; color: var(--slate); flex-shrink: 0; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/messaging.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const list = document.getElementById('conversationsList');
    list.innerHTML = '<p style="color:var(--slate);">Loading...</p>';

    const conversations = await getMyConversations();

    if (conversations.length === 0) {
      list.innerHTML = '<p style="color:var(--slate);">No conversations yet. Message someone from a job or tutor listing to get started.</p>';
      return;
    }

    list.innerHTML = conversations.map(c => {
      const name = c.otherUser ? c.otherUser.name : 'Unknown user';
      const avatar = c.otherUser && c.otherUser.avatar_url
        ? `<img src="${c.otherUser.avatar_url}" class="conv-avatar">`
        : `<div class="conv-avatar" style="display:flex; align-items:center; justify-content:center; font-size:1.3rem;">👤</div>`;
      const preview = c.last_message || 'No messages yet';
      const time = c.last_message_at ? new Date(c.last_message_at).toLocaleDateString() : '';

      return `
        <a href="chat.html?id=${c.id}" class="conv-row" style="text-decoration:none; color:inherit;">
          ${avatar}
          <div class="conv-info">
            <div class="conv-name">${name}</div>
            <div class="conv-preview">${preview}</div>
          </div>
          <div class="conv-time">${time}</div>
        </a>
      `;
    }).join('');
  })();
</script>
</body>
</html>
