<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Applications — Klaso</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Kla<span>so</span></a>
    <nav class="nav-links">
      <a href="jobs.html">Find Jobs</a>
      <a href="tutors.html">Find Tutors</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <div class="container">
    <span class="eyebrow">Your journey</span>
    <h1>My applications</h1>
  </div>
</section>

<!-- ================= LIST ================= -->
<section class="container" style="padding:32px 20px;">
  <div id="applicationsList" style="display:flex; flex-direction:column; gap:14px;"></div>
</section>

<style>
  .app-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .status-badge {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .status-pending { background: rgba(232,163,61,0.15); color: var(--marigold-deep); }
  .status-shortlisted { background: rgba(47,111,78,0.15); color: var(--chalk-green); }
  .status-rejected { background: rgba(225,91,79,0.15); color: var(--coral); }
  .status-hired { background: var(--ink); color: var(--paper); }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/messaging.js"></script>
<script src="../js/reviews.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/auth-nav.js"></script>
<script src="../js/main.js"></script>
<script>
  let currentUserId = null;

  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
    currentUserId = session.user.id;
    loadApplications();
  })();

  async function loadApplications() {
    const list = document.getElementById('applicationsList');
    list.innerHTML = '<p style="color:var(--slate);">Loading...</p>';

    const { data: apps, error } = await supabaseClient
      .from('applications')
      .select('*, jobs(title, school_name, school_id)')
      .eq('applicant_id', currentUserId)
      .order('created_at', { ascending: false });

    if (error || !apps || apps.length === 0) {
      list.innerHTML = '<p style="color:var(--slate);">No applications yet. <a href="jobs.html" style="color:var(--marigold-deep); font-weight:600;">Browse jobs →</a></p>';
      return;
    }

    list.innerHTML = apps.map(a => `
      <div class="app-card">
        <div>
          <strong>${a.jobs ? a.jobs.title : 'Job'}</strong>
          <p style="font-size:0.85rem; color:var(--slate); margin-top:4px;">${a.jobs ? a.jobs.school_name : ''}</p>
        </div>
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span class="status-badge status-${a.status}">${a.status}</span>
          ${a.status === 'hired' && a.jobs ? `
            <button class="btn btn-sm btn-ghost" onclick="leaveReview('${a.jobs.school_id}', 'job_${a.job_id}')">⭐ Review school</button>
          ` : ''}
        </div>
      </div>
    `).join('');
  }

  async function leaveReview(revieweeId, context) {
    const ratingStr = prompt('Rate this school from 1 to 5 stars:');
    const rating = parseInt(ratingStr);

    if (!rating || rating < 1 || rating > 5) {
      alert('Please enter a number between 1 and 5.');
      return;
    }

    const comment = prompt('Add a comment (optional):');

    const result = await submitReview(revieweeId, rating, comment, context);

    if (!result.success) {
      alert('Error submitting review: ' + result.message);
      return;
    }

    alert('✓ Review submitted!');
  }
</script>
</body>
</html>
